version: "3.9"

services:
  neo4j:
    image: neo4j:5.21
    container_name: argos-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/argosnt123}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - argos_net

  ollama:
    image: ollama/ollama:latest
    container_name: argos-ollama
    restart: unless-stopped
    profiles:
      - ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - argos_net

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_data:

networks:
  argos_net:
    name: argos_net
